openapi: 3.1.0
info:
  title: LATAS Ventas API - UI Registro de Ventas
  version: 0.5.0
  description: |
    Contrato de integracion para la UI de registro de ventas.
    Define endpoints consumidos por la pantalla de captura rapida.
servers:
  - url: http://localhost:8000
paths:
  /api/health:
    get:
      summary: Health check del backend
      operationId: getHealth
      tags: [System]
      responses:
        '200':
          description: Backend operativo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/clientes:
    get:
      summary: Buscar clientes para autocomplete
      operationId: searchClientes
      tags: [Clientes]
      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: Texto parcial para filtrar clientes por nombre.
      responses:
        '200':
          description: Lista de clientes activos compatibles con autocomplete.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClienteResponse'

  /api/medios-pago:
    get:
      summary: Listar medios de pago activos
      operationId: listMediosPago
      tags: [MediosPago]
      responses:
        '200':
          description: Catalogo para selector de forma de pago en tabla dinamica.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MedioPagoResponse'

  /api/ventas:
    post:
      summary: Registrar venta con pagos
      operationId: createVenta
      tags: [Ventas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVentaRequest'
      responses:
        '201':
          description: Venta registrada correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VentaResponse'
        '400':
          description: Error de validacion funcional o de formato.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    ClienteResponse:
      type: object
      required: [id, nombre, creado_en, modificado_en, estado]
      properties:
        id:
          type: integer
        nombre:
          type: string
        telefono:
          type: string
          nullable: true
        creado_en:
          type: string
          format: date-time
        modificado_en:
          type: string
          format: date-time
        estado:
          type: string

    MedioPagoResponse:
      type: object
      required: [id, codigo, nombre, activo, creado_en, modificado_en]
      properties:
        id:
          type: integer
        codigo:
          type: string
        nombre:
          type: string
        activo:
          type: boolean
        creado_en:
          type: string
          format: date-time
        modificado_en:
          type: string
          format: date-time

    CreatePagoRequest:
      type: object
      required: [medio, monto]
      properties:
        medio:
          type: string
          minLength: 1
        monto:
          type: string
          description: Decimal serializado con 2 decimales.

    CreateVentaRequest:
      type: object
      required: [empresa, tipo, numero_referencia, descripcion, valor_total, pagos]
      properties:
        empresa:
          type: string
          enum: [latas_sas, tomas_gomez]
        tipo:
          type: string
          enum: [formal, informal]
        numero_referencia:
          type: string
          minLength: 1
        descripcion:
          type: string
          minLength: 1
        valor_total:
          type: string
          description: Decimal serializado con 2 decimales.
        cliente_id:
          type: integer
          nullable: true
        pagos:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreatePagoRequest'

    PagoResponse:
      type: object
      required: [id, venta_id, medio, monto]
      properties:
        id:
          type: integer
        venta_id:
          type: integer
        medio:
          type: string
        monto:
          type: string

    VentaResponse:
      type: object
      required:
        [id, empresa, tipo, numero_referencia, descripcion, valor_total, estado, creado_en, modificado_en, pagos]
      properties:
        id:
          type: integer
        empresa:
          type: string
        tipo:
          type: string
        numero_referencia:
          type: string
        descripcion:
          type: string
        valor_total:
          type: string
        cliente_id:
          type: integer
          nullable: true
        estado:
          type: string
        creado_en:
          type: string
          format: date-time
        modificado_en:
          type: string
          format: date-time
        pagos:
          type: array
          items:
            $ref: '#/components/schemas/PagoResponse'

    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
