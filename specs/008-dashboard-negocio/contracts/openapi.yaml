openapi: 3.1.0
info:
  title: LATAS Ventas API - Dashboard de Negocio
  version: 0.8.0
  description: Contrato para indicadores agregados de negocio sobre ventas activas.
servers:
  - url: http://localhost:8000
paths:
  /api/dashboard:
    get:
      summary: Consultar indicadores de negocio del dashboard
      operationId: getDashboard
      tags: [Reportes]
      responses:
        '200':
          description: Indicadores agregados de ventas activas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'

components:
  schemas:
    VentasPorMesItem:
      type: object
      required: [anio, mes, periodo, cantidad_ventas, valor_total]
      properties:
        anio:
          type: integer
          minimum: 2000
        mes:
          type: integer
          minimum: 1
          maximum: 12
        periodo:
          type: string
          pattern: '^[0-9]{4}-[0-9]{2}$'
          description: Periodo calendario en formato YYYY-MM.
        cantidad_ventas:
          type: integer
          minimum: 0
        valor_total:
          type: string
          description: Decimal serializado con 2 decimales.

    VentasPorEmpresaItem:
      type: object
      required: [empresa, cantidad_ventas, valor_total]
      properties:
        empresa:
          type: string
        cantidad_ventas:
          type: integer
          minimum: 0
        valor_total:
          type: string
          description: Decimal serializado con 2 decimales.

    MetodoPagoDashboardItem:
      type: object
      required: [medio, cantidad_pagos, valor_total, porcentaje]
      properties:
        medio:
          type: string
        cantidad_pagos:
          type: integer
          minimum: 0
        valor_total:
          type: string
          description: Decimal serializado con 2 decimales.
        porcentaje:
          type: string
          description: Porcentaje del total pagado serializado con 2 decimales.

    DashboardResponse:
      type: object
      required:
        - ventas_por_mes
        - ventas_por_empresa
        - metodos_pago
        - ticket_promedio
        - total_ventas
        - total_mes_actual
        - cantidad_ventas
        - generado_en
      properties:
        ventas_por_mes:
          type: array
          items:
            $ref: '#/components/schemas/VentasPorMesItem'
        ventas_por_empresa:
          type: array
          items:
            $ref: '#/components/schemas/VentasPorEmpresaItem'
        metodos_pago:
          type: array
          items:
            $ref: '#/components/schemas/MetodoPagoDashboardItem'
        ticket_promedio:
          type: string
          description: Total de ventas activas dividido por cantidad de ventas activas, con 2 decimales.
        total_ventas:
          type: string
          description: Total de ventas activas con 2 decimales.
        total_mes_actual:
          type: string
          description: Total de ventas activas del mes calendario actual con 2 decimales.
        cantidad_ventas:
          type: integer
          minimum: 0
        generado_en:
          type: string
          format: date-time
