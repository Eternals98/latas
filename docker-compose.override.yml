services:
  frontend:
    build: !reset null
    image: node:22.13-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

  backend:
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    volumes:
      - ./backend:/app
      - ventas_data:/data
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/ventas.db
      WATCHFILES_FORCE_POLLING: "true"
